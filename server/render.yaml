# Sample render.yaml for the Chat App server (edit before use)
# For more info: https://render.com/docs/deploy-templates
services:
  - type: web
    name: chat-app-server
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    # Uncomment and set the following if you want render to set env vars from the file
